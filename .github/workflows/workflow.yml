name: Deploy Node.js App to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy via SSH
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Deploy to VPS using SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
              echo "🛠 DEPLOY STARTED"
              whoami
              pwd
              ls -la
              cd /var/www/html/gavran-project/gavran-backend-nodejs
              pwd
              git status
              git pull origin main --rebase
              git log -1 --oneline
              pm2 restart gavran-backend-nodejs
              echo "DEPLOY DONE"
